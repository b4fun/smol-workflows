name: Publish CLI crate to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish smol-workflow-cli
    runs-on: ubuntu-latest
    environment: cargo-release

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Resolve crate version
        id: version
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; metadata=json.load(sys.stdin); print(next(pkg["version"] for pkg in metadata["packages"] if pkg["name"] == "smol-workflow-cli"))')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing Rust crates at version $version"

      - name: Verify tag matches crate version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v${{ steps.version.outputs.version }}"
          actual="${GITHUB_REF_NAME}"
          if [ "$actual" != "$expected" ]; then
            echo "Tag $actual does not match crate version ${{ steps.version.outputs.version }}; expected $expected" >&2
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Check already-published crate versions
        id: published
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          check_crate() {
            local crate="$1"
            local output="$2"
            local status
            status="$(curl -sS -o /tmp/${crate}.json -w '%{http_code}' \
              -H 'User-Agent: smol-workflows-publish-ci' \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}")"
            case "$status" in
              200) echo "${output}=true" >> "$GITHUB_OUTPUT" ;;
              404) echo "${output}=false" >> "$GITHUB_OUTPUT" ;;
              *) echo "Unexpected crates.io status $status for ${crate} ${VERSION}" >&2; cat /tmp/${crate}.json >&2; exit 1 ;;
            esac
          }

          check_crate smol-workflow-sandbox sandbox_exists
          check_crate smol-workflow-engine engine_exists
          check_crate smol-workflow-cli cli_exists

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Verify sandbox package
        if: steps.published.outputs.sandbox_exists != 'true'
        run: cargo publish -p smol-workflow-sandbox --dry-run --locked

      - name: Publish sandbox crate
        if: steps.published.outputs.sandbox_exists != 'true'
        run: cargo publish -p smol-workflow-sandbox --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for sandbox crate to reach crates.io index
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for attempt in $(seq 1 30); do
            if cargo info "smol-workflow-sandbox@${VERSION}" >/dev/null 2>&1; then
              echo "smol-workflow-sandbox ${VERSION} is available in the crates.io index"
              exit 0
            fi
            echo "Waiting for smol-workflow-sandbox ${VERSION} to reach the crates.io index (attempt ${attempt}/30)..."
            sleep 10
          done
          echo "smol-workflow-sandbox ${VERSION} did not appear in the crates.io index in time" >&2
          exit 1

      - name: Verify engine package
        if: steps.published.outputs.engine_exists != 'true'
        run: cargo publish -p smol-workflow-engine --dry-run --locked

      - name: Publish engine crate
        if: steps.published.outputs.engine_exists != 'true'
        run: cargo publish -p smol-workflow-engine --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for engine crate to reach crates.io index
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          for attempt in $(seq 1 30); do
            if cargo info "smol-workflow-engine@${VERSION}" >/dev/null 2>&1; then
              echo "smol-workflow-engine ${VERSION} is available in the crates.io index"
              exit 0
            fi
            echo "Waiting for smol-workflow-engine ${VERSION} to reach the crates.io index (attempt ${attempt}/30)..."
            sleep 10
          done
          echo "smol-workflow-engine ${VERSION} did not appear in the crates.io index in time" >&2
          exit 1

      - name: Verify CLI package
        if: steps.published.outputs.cli_exists != 'true'
        run: cargo publish -p smol-workflow-cli --dry-run --locked

      - name: Publish CLI crate
        if: steps.published.outputs.cli_exists != 'true'
        run: cargo publish -p smol-workflow-cli --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
