name: Release smol-wf

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: smol-wf-linux-x86_64.tar.gz
            binary: smol-wf
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: smol-wf-macos-aarch64.tar.gz
            binary: smol-wf
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: smol-wf-windows-x86_64.zip
            binary: smol-wf.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --locked -p smol-workflow-cli --target ${{ matrix.target }}

      - name: Ad-hoc sign macOS binary
        if: runner.os == 'macOS'
        run: codesign --force --sign - target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: tar -C target/${{ matrix.target }}/release -czf ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
