name: Release smol-wf

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: smol-wf-linux-x86_64.tar.gz
            binaries: smol-wf smol-sandbox-exe-dev
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: smol-wf-linux-aarch64.tar.gz
            binaries: smol-wf smol-sandbox-exe-dev
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: smol-wf-macos-aarch64.tar.gz
            binaries: smol-wf smol-sandbox-exe-dev
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: smol-wf-windows-x86_64.zip
            binaries: smol-wf.exe smol-sandbox-exe-dev.exe

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation toolchain for Linux ARM
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binaries
        run: cargo build --release --locked -p smol-workflow-cli -p smol-sandbox-exe-dev --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Ad-hoc sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          for binary in ${{ matrix.binaries }}; do
            codesign --force --sign - target/${{ matrix.target }}/release/${binary}
          done

      - name: Package Unix binaries
        if: runner.os != 'Windows'
        run: tar -C target/${{ matrix.target }}/release -czf ${{ matrix.archive }} ${{ matrix.binaries }}

      - name: Package Windows binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binaries = "${{ matrix.binaries }}" -split " " | ForEach-Object { "target/${{ matrix.target }}/release/$_" }
          Compress-Archive -Path $binaries -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          generate_release_notes: true
