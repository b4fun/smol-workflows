name: Publish SDK to npm

on:
  push:
    tags:
      - 'ts/sdk/v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish @smol-workflow/sdk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: ts/sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(node -p "require('./package.json').version")"
          expected="ts/sdk/v${version}"
          actual="${GITHUB_REF_NAME}"
          if [ "$actual" != "$expected" ]; then
            echo "Tag $actual does not match package version $version; expected $expected" >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Resolve npm dist-tag
        id: dist_tag
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "$version" == *-* ]]; then
            prerelease="${version#*-}"
            npm_tag="${prerelease%%.*}"
          else
            npm_tag="latest"
          fi
          echo "Publishing version $version with npm dist-tag $npm_tag"
          echo "tag=$npm_tag" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: npm publish --access public --provenance --tag "${{ steps.dist_tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
