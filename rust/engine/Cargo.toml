[package]
name = "smol-workflow-engine"
description = "Rust implementation of the smol-workflows engine."
version.workspace = true
edition.workspace = true

[lib]
name = "smol_workflow_engine"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
rquickjs = "0.11"
rquickjs-serde = "0.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
